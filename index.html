<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <div>
    <div class="header-title">Habit Tracker</div>
    <div class="header-date" id="hDate"></div>
  </div>
  <button class="icon-btn" id="settingsBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</header>

<div class="week-wrap">
  <div class="week-lbl">This Week</div>
  <div class="week-strip" id="weekStrip"></div>
</div>

<div class="add-wrap">
  <button class="add-btn" id="addBtn">
    <span class="add-plus">+</span> Add New Habit
  </button>
</div>

<div class="habits-wrap" id="habitsList"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">New Habit</h2>
    <input type="text" class="modal-input" id="habitInput" placeholder="e.g. Morning Run, Read 30 min…" maxlength="40">
    <div class="sec-lbl">Icon</div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="sec-lbl">Color</div>
    <div class="color-picker" id="colorPicker"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-save"   id="btnSave">Save Habit</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Delete Habit?</h3>
    <p>All tracking data will be permanently removed.</p>
    <div class="confirm-btns">
      <button class="btn-no"  id="confirmNo">Cancel</button>
      <button class="btn-yes" id="confirmYes">Delete</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings-overlay" id="settingsOverlay"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-head">
    <h2>Settings</h2>
    <button class="settings-close" id="settingsClose">✕</button>
  </div>
  <div class="s-item">
    <div><div class="s-label">Reminders</div><div class="s-sub">Daily habit reminder</div></div>
    <div class="toggle" onclick="this.classList.toggle('on')"></div>
  </div>
  <div class="s-item">
    <div><div class="s-label">Show Streaks</div><div class="s-sub">Fire emoji for streaks</div></div>
    <div class="toggle on" onclick="this.classList.toggle('on')"></div>
  </div>
  <div class="s-item">
    <div><div class="s-label">Start on Monday</div><div class="s-sub">Week view starts Monday</div></div>
    <div class="toggle on" onclick="this.classList.toggle('on')"></div>
  </div>
  <div style="position:absolute;bottom:24px;left:18px;right:18px;text-align:center;font-size:.68rem;color:var(--sub)">Habit Tracker · v2.0</div>
</div>

<script src="script.js"></script>
</body>
</html>
